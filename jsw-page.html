<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Name</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f6f4f0;
        --text: #1a1a1a;
        --muted: #8a8580;
        --accent: #c4653a;
        --card-bg: #ffffff;
        --border: #e8e4df;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        overflow: hidden;
      }

      /* subtle grain overlay */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 200px;
        pointer-events: none;
        z-index: 100;
      }

      .container {
        max-width: 460px;
        width: 100%;
        animation: fadeUp 0.8s ease-out;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* avatar */
      .avatar {
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), #e8a87c);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Instrument Serif', serif;
        font-size: 2.2rem;
        color: #fff;
        margin-bottom: 1.8rem;
        box-shadow: 0 4px 20px rgba(196, 101, 58, 0.15);
      }

      .name {
        font-family: 'Instrument Serif', serif;
        font-size: 2.6rem;
        letter-spacing: -0.02em;
        line-height: 1.1;
        margin-bottom: 0.6rem;
      }

      .tagline {
        font-size: 1.05rem;
        color: var(--muted);
        font-weight: 300;
        line-height: 1.6;
        margin-bottom: 0.4rem;
      }

      .divider {
        width: 32px;
        height: 2px;
        background: var(--accent);
        margin: 1.6rem 0;
        border-radius: 1px;
      }

      .bio {
        font-size: 0.95rem;
        color: var(--muted);
        line-height: 1.7;
        font-weight: 300;
        margin-bottom: 2.4rem;
      }

      /* links */
      .links {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .link-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 18px;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        text-decoration: none;
        color: var(--text);
        transition: all 0.25s ease;
        cursor: pointer;
      }

      .link-item:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.04);
      }

      .link-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        background: var(--bg);
      }

      .link-icon svg {
        width: 18px;
        height: 18px;
        stroke: var(--text);
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .link-text {
        flex: 1;
      }

      .link-title {
        font-size: 0.92rem;
        font-weight: 500;
        margin-bottom: 1px;
      }

      .link-desc {
        font-size: 0.78rem;
        color: var(--muted);
        font-weight: 300;
      }

      .link-arrow {
        color: var(--muted);
        font-size: 0.85rem;
        transition: transform 0.25s ease;
      }

      .link-item:hover .link-arrow {
        transform: translateX(3px);
        color: var(--accent);
      }

      /* footer */
      .footer {
        margin-top: 3rem;
        text-align: center;
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.04em;
      }

      /* stagger animations */
      .link-item:nth-child(1) {
        animation: fadeUp 0.6s ease-out 0.15s both;
      }
      .link-item:nth-child(2) {
        animation: fadeUp 0.6s ease-out 0.25s both;
      }
      .link-item:nth-child(3) {
        animation: fadeUp 0.6s ease-out 0.35s both;
      }
      .link-item:nth-child(4) {
        animation: fadeUp 0.6s ease-out 0.45s both;
      }

      @media (max-width: 500px) {
        .name {
          font-size: 2rem;
        }
        .container {
          padding: 0 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 아바타: 이니셜을 본인 것으로 바꾸세요 -->
      <div class="avatar">H</div>

      <!-- 이름 & 한줄 소개 -->
      <h1 class="name">정순원</h1>
      <p class="tagline">안녕하세요</p>

      <div class="divider"></div>

      <p class="bio">
        흠..<br />
        피곤하고 졸리다..
      </p>

      <!-- 링크들: href를 본인 URL로 교체하세요 -->
      <div class="links">
        <a class="link-item" href="https://github.com/dkzndkqh" target="_blank">
          <div class="link-icon">
            <svg viewBox="0 0 24 24">
              <path
                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
              />
            </svg>
          </div>
          <div class="link-text">
            <div class="link-title">GitHub</div>
            <div class="link-desc">코드 보기</div>
          </div>
          <span class="link-arrow">→</span>
        </a>

        <a
          class="link-item"
          href="https://linkedin.com/in/username"
          target="_blank"
        >
          <div class="link-icon">
            <svg viewBox="0 0 24 24">
              <path
                d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"
              />
              <rect x="2" y="9" width="4" height="12" />
              <circle cx="4" cy="4" r="2" />
            </svg>
          </div>
          <div class="link-text">
            <div class="link-title">LinkedIn</div>
            <div class="link-desc">프로필 보기</div>
          </div>
          <span class="link-arrow">→</span>
        </a>

        <a class="link-item" href="https://blog.example.com" target="_blank">
          <div class="link-icon">
            <svg viewBox="0 0 24 24">
              <path d="M12 20h9" />
              <path
                d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
              />
            </svg>
          </div>
          <div class="link-text">
            <div class="link-title">Blog</div>
            <div class="link-desc">기술 블로그</div>
          </div>
          <span class="link-arrow">→</span>
        </a>

        <a class="link-item" href="mailto:hello@example.com">
          <div class="link-icon">
            <svg viewBox="0 0 24 24">
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
              />
              <polyline points="22,6 12,13 2,6" />
            </svg>
          </div>
          <div class="link-text">
            <div class="link-title">Email</div>
            <div class="link-desc">hello@example.com</div>
          </div>
          <span class="link-arrow">→</span>
        </a>
      </div>

      <div class="footer">© 2026 정순원</div>
    </div>
  </body>
</html>
